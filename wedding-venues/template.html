<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>会場名 | 株式会社CIMA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="logo">株式会社CIMA</a>
  </header>

  <main>
    <section class="sec-pad">
      <div class="container">
        <p class="sec-label">VENUE DETAIL</p>
        <h1 class="sec-title" style="text-align: left; margin-bottom: 32px;">会場名がここに入ります</h1>
        
        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px;" class="grid-r">
          <div class="fade-in">
            <div style="aspect-ratio: 16/9; background: var(--border); border-radius: var(--radius); margin-bottom: 24px;"></div>
            <div class="venue-description" style="line-height: 1.8;">
              <p>会場の詳細な説明文がここに入ります。雰囲気、収容人数、推薦ポイントなどを詳しく解説します。</p>
            </div>
            
            <div class="venue-gallery" style="margin-top: 40px;">
              <h3 style="margin-bottom: 20px;">Gallery</h3>
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                <div style="aspect-ratio: 1/1; background: var(--border); border-radius: var(--radius-sm);"></div>
                <div style="aspect-ratio: 1/1; background: var(--border); border-radius: var(--radius-sm);"></div>
                <div style="aspect-ratio: 1/1; background: var(--border); border-radius: var(--radius-sm);"></div>
              </div>
            </div>
          </div>
          
          <div class="fade-in">
            <div class="card" style="padding: 32px;">
              <h3 style="font-size: 1.125rem; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 8px;">Access / Info</h3>
              <ul style="list-style: none; font-size: 0.875rem;">
                <li style="margin-bottom: 12px;"><strong>所在地:</strong> ○○県○○市○○ 1-2-3</li>
                <li style="margin-bottom: 12px;"><strong>アクセス:</strong> ○○駅より徒歩5分</li>
                <li style="margin-bottom: 12px;"><strong>収容人数:</strong> 20名〜100名</li>
                <li style="margin-bottom: 12px;"><strong>スタイル:</strong> ガーデン / レストラン</li>
              </ul>
              <div style="margin-top: 32px;">
                <a href="../contact.html" class="btn btn-primary" style="width: 100%;">この会場について相談する</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-copyright"><p>© 2026 株式会社CIMAALL RIGHT</p></div>
  </footer>
  <script src="../js/hamburger.js"></script>
  <script src="../js/scroll-animation.js"></script>
</body>
</html>
