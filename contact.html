<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ | 株式会社CIMA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="株式会社CIMAへのお問い合わせ・資料請求はこちら。フリースタイルウエディング、篠島でのイベントのご相談を承ります。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/layout.js" defer></script>
  <script src="js/hamburger.js" defer></script>
  <script src="js/form-tabs.js" defer></script>
  <script src="js/scroll-animation.js" defer></script>
</head>
<body>
  <div data-partial="header"></div>

  <main>
    <section class="sub-hero sec-pad">
      <div class="container">
        <div class="sec-head">
          <span class="sec-num">CT / 01</span>
          <div class="sec-head-inner">
            <p class="sec-label">Contact</p>
            <h2 class="sec-title">お問い合わせ</h2>
          </div>
        </div>
      </div>
    </section>

    <section class="sec-pad">
      <div class="container form-wrap">
        <p class="form-intro">
          フリースタイルウエディング、篠島BBQ、地域連携のご相談など、<br>
          以下のフォームよりお気軽にお問い合わせください。
        </p>

        <div class="form-tabs">
          <button class="form-tab active" data-type="inquiry">お問い合わせ</button>
          <button class="form-tab" data-type="document">資料請求</button>
        </div>

        <form action="#" method="POST" class="form-card">
          <div id="inquiry-panel" class="form-panel active">
            <div class="form-field">
              <label class="form-label" for="type">お問い合わせ種別<span class="req">*</span></label>
              <select id="type" class="form-select" name="type">
                <option value="general">一般のお問い合わせ</option>
                <option value="wedding">ウエディングについて</option>
                <option value="event">イベント / BBQ について</option>
                <option value="region">地域連携 / プロデュース</option>
                <option value="other">その他</option>
              </select>
            </div>
          </div>

          <div id="document-panel" class="form-panel">
            <div class="form-field">
              <label class="form-label" for="document_type">資料請求の内容<span class="req">*</span></label>
              <select id="document_type" class="form-select" name="document_type">
                <option value="company">会社案内</option>
                <option value="wedding">ウエディングプラン資料</option>
                <option value="venue">ロケーション・会場資料</option>
              </select>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label" for="company">会社名</label>
            <input id="company" type="text" class="form-input" name="company" placeholder="株式会社 ○○">
          </div>
          <div class="form-field">
            <label class="form-label" for="name">お名前<span class="req">*</span></label>
            <input id="name" type="text" class="form-input" name="name" placeholder="山田 太郎" required>
          </div>
          <div class="form-field">
            <label class="form-label" for="email">メールアドレス<span class="req">*</span></label>
            <input id="email" type="email" class="form-input" name="email" placeholder="example@cima.jp" required>
          </div>
          <div class="form-field">
            <label class="form-label" for="phone">電話番号</label>
            <input id="phone" type="tel" class="form-input" name="phone" placeholder="090-0000-0000">
          </div>
          <div class="form-field">
            <label class="form-label" for="message">お問い合わせ内容<span class="req">*</span></label>
            <textarea id="message" class="form-textarea" name="message" placeholder="ご希望の日程・人数・雰囲気など、ざっくりで構いません。" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary form-submit">内容を確認して送信する</button>
          <p class="form-note">* 必須項目　／　ご記入いただいた情報は <a href="privacy.html">プライバシーポリシー</a> に基づき厳重に管理します。</p>
        </form>
      </div>
    </section>
  </main>

  <div data-partial="footer"></div>
  <div data-partial="floating"></div>
</body>
</html>
